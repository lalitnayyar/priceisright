<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Configuration — The Price Is Right</title>
<style>
  :root {
    --bg: #1a0d08; --card: #2a1510; --border: #594139;
    --text: #f7ddd5; --muted: #a07060; --accent: #e8622a;
    --green: #4caf50; --red: #e53935; --amber: #ffa000;
    --input-bg: #1d100c; --label: #a07060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; padding: 20px; }
  h2 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: bold; color: var(--accent); margin-bottom: 14px; letter-spacing: 0.05em; }
  .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 200px; }
  label { display: block; font-size: 10px; color: var(--label); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 12px;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 80px; }
  .secret { -webkit-text-security: disc; text-security: disc; }
  .test-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; margin-bottom: 12px; }
  .btn-test { background: #3a1f18; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; white-space: nowrap; }
  .btn-test:hover { background: #4a2520; }
  .test-status { font-size: 11px; color: var(--muted); }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .slider-val { min-width: 36px; text-align: right; color: var(--accent); font-weight: bold; }
  .show-keys-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 11px; color: var(--muted); cursor: pointer; }
  .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .btn { padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; border: 1px solid var(--border); }
  .btn-secondary { background: #2a1510; color: var(--text); }
  .btn-secondary:hover { background: #3a2018; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: bold; flex: 1; }
  .btn-primary:hover { background: #d4521f; }
  #msg-bar { padding: 10px 14px; border-radius: 4px; margin-top: 12px; font-size: 12px; display: none; }
  .msg-ok { background: #1a3a1a; border: 1px solid var(--green); color: var(--green); }
  .msg-err { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }
  .msg-info { background: #1a2a3a; border: 1px solid #4a8ab0; color: #7ab8d8; }
  select option { background: var(--card); }
</style>
</head>
<body>
<h2>⚙️ System Configuration</h2>
<p class="subtitle">Manage agent parameters, API keys, and integrations. Changes apply immediately to all agents.</p>

<!-- API Keys -->
<div class="card">
  <div class="card-title">🔑 API Keys</div>
  <label class="show-keys-row">
    <input type="checkbox" id="show-keys-toggle"> Show Keys
  </label>
  <div class="row">
    <div class="field"><label>OpenAI API Key</label><input type="text" id="OPENAI_API_KEY" class="secret" placeholder="sk-..."></div>
    <div class="field"><label>Anthropic API Key</label><input type="text" id="ANTHROPIC_API_KEY" class="secret" placeholder="sk-ant-..."></div>
  </div>
  <div class="test-row">
    <button class="btn-test" data-test="openai">Test OpenAI</button>
    <span class="test-status" id="test-openai-status">Not tested</span>
    <button class="btn-test" data-test="anthropic" style="margin-left:20px">Test Anthropic</button>
    <span class="test-status" id="test-anthropic-status">Not tested</span>
  </div>
  <div class="row">
    <div class="field"><label>Pushover User Key</label><input type="text" id="PUSHOVER_USER" class="secret" placeholder="User Key"></div>
    <div class="field"><label>Pushover App Token</label><input type="text" id="PUSHOVER_TOKEN" class="secret" placeholder="App Token"></div>
  </div>
  <div class="test-row">
    <button class="btn-test" data-test="pushover">Test Pushover</button>
    <span class="test-status" id="test-pushover-status">Not tested</span>
  </div>
  <div class="row">
    <div class="field"><label>Modal Token ID</label><input type="text" id="MODAL_TOKEN_ID" class="secret" placeholder="ak-..."></div>
    <div class="field"><label>Modal Token Secret</label><input type="text" id="MODAL_TOKEN_SECRET" class="secret" placeholder="..."></div>
  </div>
  <div class="test-row">
    <button class="btn-test" data-test="modal">Test Modal</button>
    <span class="test-status" id="test-modal-status">Not tested</span>
  </div>
</div>

<!-- Agent Config -->
<div class="card">
  <div class="card-title">🤖 Agent Configuration</div>
  <div class="row">
    <div class="field">
      <label>Deal Threshold (%)</label>
      <div class="slider-row">
        <input type="range" id="DEAL_THRESHOLD" min="1" max="90" value="50">
        <span class="slider-val" id="deal-thresh-val">50</span>
      </div>
    </div>
    <div class="field">
      <label>Scan Interval (min)</label>
      <div class="slider-row">
        <input type="range" id="SCAN_INTERVAL_MINUTES" min="1" max="120" value="5">
        <span class="slider-val" id="scan-interval-val">5</span>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="field"><label>Scanner Model</label>
      <select id="SCANNER_MODEL">
        <option>gpt-4o-mini</option><option>gpt-4o</option><option>gpt-3.5-turbo</option>
      </select>
    </div>
    <div class="field"><label>Frontier Model</label>
      <select id="FRONTIER_MODEL">
        <option>gpt-4o</option><option>gpt-4o-mini</option><option>gpt-4-turbo</option>
      </select>
    </div>
    <div class="field"><label>Messaging Model</label>
      <select id="MESSAGING_MODEL">
        <option>claude-3-5-sonnet-20241022</option><option>claude-3-opus-20240229</option><option>claude-3-haiku-20240307</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="field"><label>Ensemble Weights (Frontier, Specialist, DNN — must sum to 1.0)</label>
      <input type="text" id="ENSEMBLE_WEIGHTS" placeholder="0.8, 0.1, 0.1">
    </div>
  </div>
</div>

<!-- RAG -->
<div class="card">
  <div class="card-title">🧠 RAG &amp; Vector Store</div>
  <div class="row">
    <div class="field"><label>ChromaDB Storage Path</label><input type="text" id="CHROMA_DB_PATH" placeholder="./data/products_vectorstore"></div>
    <div class="field"><label>Embedding Model</label>
      <select id="EMBEDDING_MODEL">
        <option>sentence-transformers/all-MiniLM-L6-v2</option><option>text-embedding-3-small</option><option>text-embedding-3-large</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>RAG Results Count</label>
      <div class="slider-row">
        <input type="range" id="CHROMA_RESULTS" min="1" max="50" value="5">
        <span class="slider-val" id="chroma-results-val">5</span>
      </div>
    </div>
    <div class="field">
      <label>Visualisation Max Points</label>
      <div class="slider-row">
        <input type="range" id="RAG_MAX_POINTS" min="100" max="5000" step="100" value="1000">
        <span class="slider-val" id="rag-max-val">1000</span>
      </div>
    </div>
  </div>
</div>

<!-- Notifications -->
<div class="card">
  <div class="card-title">🔔 Notifications</div>
  <div class="row">
    <div class="field"><label>Pushover Sound</label><input type="text" id="PUSHOVER_SOUND" placeholder="pushover"></div>
    <div class="field"><label>Notification Title</label><input type="text" id="NOTIFICATION_TITLE" placeholder="The Price Is Right Alert"></div>
  </div>
  <div class="row">
    <div class="field">
      <label>Min Interval Between Notifications (min)</label>
      <div class="slider-row">
        <input type="range" id="NOTIF_MIN_INTERVAL" min="1" max="120" value="5">
        <span class="slider-val" id="notif-interval-val">5</span>
      </div>
    </div>
  </div>
</div>

<!-- Feed Sources -->
<div class="card">
  <div class="card-title">📡 Feed Sources</div>
  <div class="row">
    <div class="field"><label>Feed Sources (one per line)</label>
      <textarea id="RSS_FEEDS" placeholder="https://www.dealnews.com/rss.html"></textarea>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Max Deals Per Scan</label>
      <div class="slider-row">
        <input type="range" id="MAX_DEALS_PER_SCAN" min="10" max="200" step="5" value="50">
        <span class="slider-val" id="max-deals-val">50</span>
      </div>
    </div>
  </div>
</div>

<!-- System -->
<div class="card">
  <div class="card-title">⚙️ System</div>
  <div class="row">
    <div class="field"><label>Memory File Path</label><input type="text" id="MEMORY_FILE" placeholder="./data/memory.json"></div>
    <div class="field"><label>Log Level</label>
      <select id="LOG_LEVEL"><option>INFO</option><option>DEBUG</option><option>WARNING</option><option>ERROR</option></select>
    </div>
  </div>
  <div class="row">
    <div class="field"><label>DNN Weights Path</label><input type="text" id="DNN_WEIGHTS_PATH" placeholder="./data/dnn_weights.pt"></div>
    <div class="field"><label>Dashboard Port</label><input type="number" id="DASHBOARD_PORT" placeholder="7860"></div>
    <div class="field"><label>API Port</label><input type="number" id="API_PORT" placeholder="8000"></div>
  </div>
</div>

<!-- Action Bar -->
<div class="action-bar">
  <button class="btn btn-secondary" id="btn-reset">🔄 Reset to Defaults</button>
  <button class="btn btn-secondary" id="btn-validate">✅ Validate Only</button>
  <button class="btn btn-secondary" id="btn-export">📤 Export Settings</button>
  <button class="btn btn-secondary" id="btn-import-env">📂 Import .env</button>
  <input type="file" id="env-file-input" accept=".env,text/plain" style="display:none">
  <button class="btn btn-primary" id="btn-save">💾 Save &amp; Apply</button>
</div>
<div id="msg-bar"></div>

<script>
const API = '';  // same-origin relative path

// ── Defaults ──────────────────────────────────────────────────────────────
const DEFAULTS = {
  OPENAI_API_KEY:'', ANTHROPIC_API_KEY:'', PUSHOVER_USER:'', PUSHOVER_TOKEN:'',
  MODAL_TOKEN_ID:'', MODAL_TOKEN_SECRET:'',
  DEAL_THRESHOLD:50, SCAN_INTERVAL_MINUTES:5,
  SCANNER_MODEL:'gpt-4o-mini', FRONTIER_MODEL:'gpt-4o', MESSAGING_MODEL:'claude-3-5-sonnet-20241022',
  ENSEMBLE_WEIGHTS:'0.8, 0.1, 0.1',
  CHROMA_DB_PATH:'./data/products_vectorstore', EMBEDDING_MODEL:'sentence-transformers/all-MiniLM-L6-v2',
  CHROMA_RESULTS:5, RAG_MAX_POINTS:1000,
  PUSHOVER_SOUND:'pushover', NOTIFICATION_TITLE:'The Price Is Right Alert', NOTIF_MIN_INTERVAL:5,
  RSS_FEEDS:'https://www.dealnews.com/rss.html\nhttps://feeds.feedburner.com/techbargains\nhttps://slickdeals.net/newsearch.php?mode=frontpage&searcharea=deals&searchin=first&rss=1',
  MAX_DEALS_PER_SCAN:50,
  MEMORY_FILE:'./data/memory.json', LOG_LEVEL:'INFO', DNN_WEIGHTS_PATH:'./data/dnn_weights.pt',
  DASHBOARD_PORT:7860, API_PORT:8000
};

// ── Slider sync ────────────────────────────────────────────────────────────
const SLIDERS = {
  DEAL_THRESHOLD:'deal-thresh-val', SCAN_INTERVAL_MINUTES:'scan-interval-val',
  CHROMA_RESULTS:'chroma-results-val', RAG_MAX_POINTS:'rag-max-val',
  NOTIF_MIN_INTERVAL:'notif-interval-val', MAX_DEALS_PER_SCAN:'max-deals-val'
};
Object.keys(SLIDERS).forEach(id => {
  const el = document.getElementById(id);
  const sp = document.getElementById(SLIDERS[id]);
  if (el && sp) el.addEventListener('input', () => sp.textContent = el.value);
});

// ── Show/hide keys ─────────────────────────────────────────────────────────
document.getElementById('show-keys-toggle').addEventListener('change', function() {
  document.querySelectorAll('.secret').forEach(el => {
    el.classList.toggle('secret', !this.checked);
  });
});

// ── setField helper ────────────────────────────────────────────────────────
function setField(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  const nativeSetter = Object.getOwnPropertyDescriptor(
    el.tagName === 'TEXTAREA' ? window.HTMLTextAreaElement.prototype :
    el.tagName === 'SELECT'   ? window.HTMLSelectElement.prototype :
                                window.HTMLInputElement.prototype, 'value');
  if (nativeSetter && nativeSetter.set) nativeSetter.set.call(el, value);
  else el.value = value;
  el.dispatchEvent(new Event('input', {bubbles:true}));
  el.dispatchEvent(new Event('change', {bubbles:true}));
  // Sync slider display
  if (SLIDERS[id]) {
    const sp = document.getElementById(SLIDERS[id]);
    if (sp) sp.textContent = value;
  }
}

// ── showMsg ────────────────────────────────────────────────────────────────
function showMsg(text, cls) {
  const bar = document.getElementById('msg-bar');
  bar.textContent = text;
  bar.className = 'msg-' + cls;
  bar.style.display = 'block';
  if (cls === 'ok') setTimeout(() => bar.style.display = 'none', 4000);
}

// ── Load settings ──────────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const r = await fetch(API + '/settings');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    Object.keys(d).forEach(k => { if (d[k] !== null && d[k] !== undefined) setField(k, String(d[k])); });
  } catch(e) {
    showMsg('⚠️ Could not load settings: ' + e.message, 'err');
  }
}

// ── Save settings ──────────────────────────────────────────────────────────
async function saveSettings() {
  const data = {};
  document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
    if (el.id && el.id !== 'show-keys-toggle' && el.id !== 'env-file-input') {
      data[el.id] = el.value.trim();
    }
  });
  showMsg('⏳ Saving...', 'info');
  try {
    const r = await fetch(API + '/settings', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    const j = await r.json();
    if (r.ok) showMsg('✅ ' + (j.message || 'Settings saved!'), 'ok');
    else showMsg('❌ ' + (j.detail || 'Save failed'), 'err');
  } catch(e) {
    showMsg('❌ Network error: ' + e.message, 'err');
  }
}

// ── Test API ───────────────────────────────────────────────────────────────
async function testApi(service) {
  const statusEl = document.getElementById('test-' + service + '-status');
  if (!statusEl) return;
  statusEl.textContent = '⏳ Testing...';
  statusEl.style.color = '#ffa000';

  // Build the payload using the exact field names the backend expects
  const getVal = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  let payload = {};
  if (service === 'openai') {
    payload = { OPENAI_API_KEY: getVal('OPENAI_API_KEY') };
    if (!payload.OPENAI_API_KEY || payload.OPENAI_API_KEY.length < 4) {
      statusEl.textContent = '⚠️ OpenAI API key is empty'; statusEl.style.color = '#ffa000'; return;
    }
  } else if (service === 'anthropic') {
    payload = { ANTHROPIC_API_KEY: getVal('ANTHROPIC_API_KEY') };
    if (!payload.ANTHROPIC_API_KEY || payload.ANTHROPIC_API_KEY.length < 4) {
      statusEl.textContent = '⚠️ Anthropic API key is empty'; statusEl.style.color = '#ffa000'; return;
    }
  } else if (service === 'pushover') {
    payload = { PUSHOVER_USER: getVal('PUSHOVER_USER'), PUSHOVER_TOKEN: getVal('PUSHOVER_TOKEN') };
    if (!payload.PUSHOVER_USER || !payload.PUSHOVER_TOKEN) {
      statusEl.textContent = '⚠️ Pushover User Key or App Token is empty'; statusEl.style.color = '#ffa000'; return;
    }
  } else if (service === 'modal') {
    payload = { MODAL_TOKEN_ID: getVal('MODAL_TOKEN_ID'), MODAL_TOKEN_SECRET: getVal('MODAL_TOKEN_SECRET') };
    if (!payload.MODAL_TOKEN_ID || !payload.MODAL_TOKEN_SECRET) {
      statusEl.textContent = '⚠️ Modal Token ID or Secret is empty'; statusEl.style.color = '#ffa000'; return;
    }
  }

  try {
    const r = await fetch(API + '/test-api/' + service, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const j = await r.json();
    if (j.ok) {
      statusEl.textContent = '✅ ' + (j.message || 'Connected');
      statusEl.style.color = '#4caf50';
    } else {
      statusEl.textContent = '⚠️ ' + (j.message || 'Failed');
      statusEl.style.color = '#ffa000';
    }
  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
    statusEl.style.color = '#e53935';
  }
}

// ── Reset to defaults ──────────────────────────────────────────────────────
function resetToDefaults() {
  if (!confirm('Reset all settings to defaults?')) return;
  Object.keys(DEFAULTS).forEach(k => setField(k, String(DEFAULTS[k])));
  showMsg('↩️ Defaults restored — click Save & Apply to persist.', 'info');
}

// ── Validate only ──────────────────────────────────────────────────────────
function validateOnly() {
  const errors = [];
  const oai = document.getElementById('OPENAI_API_KEY').value.trim();
  if (!oai) errors.push('OpenAI API Key is required');
  const weights = document.getElementById('ENSEMBLE_WEIGHTS').value.trim();
  if (weights) {
    const parts = weights.split(',').map(Number);
    const sum = parts.reduce((a,b) => a+b, 0);
    if (Math.abs(sum - 1.0) > 0.01) errors.push('Ensemble weights must sum to 1.0 (got ' + sum.toFixed(2) + ')');
  }
  const thresh = parseInt(document.getElementById('DEAL_THRESHOLD').value);
  if (thresh < 1 || thresh > 90) errors.push('Deal threshold must be between 1 and 90');
  if (errors.length) showMsg('❌ ' + errors.join(' | '), 'err');
  else showMsg('✅ All values are valid', 'ok');
}

// ── Export settings ────────────────────────────────────────────────────────
function exportSettings() {
  const data = {};
  document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
    if (el.id && el.id !== 'show-keys-toggle' && el.id !== 'env-file-input') {
      let v = el.value.trim();
      if (['OPENAI_API_KEY','ANTHROPIC_API_KEY','PUSHOVER_USER','PUSHOVER_TOKEN','MODAL_TOKEN_ID','MODAL_TOKEN_SECRET'].includes(el.id) && v.length > 4)
        v = v.substring(0,4) + '****';
      data[el.id] = v;
    }
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'priceisright_settings_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

// ── Import .env ────────────────────────────────────────────────────────────
function importEnvFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n');
    const keyMap = {
      OPENAI_API_KEY:'OPENAI_API_KEY', ANTHROPIC_API_KEY:'ANTHROPIC_API_KEY',
      PUSHOVER_USER_KEY:'PUSHOVER_USER', PUSHOVER_APP_TOKEN:'PUSHOVER_TOKEN',
      MODAL_TOKEN_ID:'MODAL_TOKEN_ID', MODAL_TOKEN_SECRET:'MODAL_TOKEN_SECRET',
      DEAL_THRESHOLD:'DEAL_THRESHOLD', DEAL_THRESHOLD_PCT:'DEAL_THRESHOLD',
      SCAN_INTERVAL_MINUTES:'SCAN_INTERVAL_MINUTES', SCAN_INTERVAL:'SCAN_INTERVAL_MINUTES',
      SCANNER_MODEL:'SCANNER_MODEL', FRONTIER_MODEL:'FRONTIER_MODEL', MESSAGING_MODEL:'MESSAGING_MODEL',
      ENSEMBLE_WEIGHTS:'ENSEMBLE_WEIGHTS',
      CHROMA_DB_PATH:'CHROMA_DB_PATH', CHROMADB_STORAGE_PATH:'CHROMA_DB_PATH',
      EMBEDDING_MODEL:'EMBEDDING_MODEL', CHROMA_RESULTS:'CHROMA_RESULTS',
      RAG_MAX_POINTS:'RAG_MAX_POINTS', PUSHOVER_SOUND:'PUSHOVER_SOUND',
      NOTIFICATION_TITLE:'NOTIFICATION_TITLE', NOTIF_MIN_INTERVAL:'NOTIF_MIN_INTERVAL',
      RSS_FEED_URLS:'RSS_FEEDS', RSS_FEEDS:'RSS_FEEDS', MAX_DEALS_PER_SCAN:'MAX_DEALS_PER_SCAN',
      MEMORY_FILE:'MEMORY_FILE', MEMORY_FILE_PATH:'MEMORY_FILE',
      LOG_LEVEL:'LOG_LEVEL', DNN_WEIGHTS_PATH:'DNN_WEIGHTS_PATH',
      DASHBOARD_PORT:'DASHBOARD_PORT', API_PORT:'API_PORT'
    };
    let count = 0;
    lines.forEach(line => {
      line = line.trim();
      if (!line || line.startsWith('#')) return;
      const eq = line.indexOf('=');
      if (eq < 0) return;
      const envKey = line.slice(0, eq).trim();
      let val = line.slice(eq+1).trim().replace(/^["']|["']$/g, '');
      const fieldId = keyMap[envKey];
      if (fieldId) { setField(fieldId, val); count++; }
    });
    // Show keys after import so user can verify
    document.getElementById('show-keys-toggle').checked = true;
    document.querySelectorAll('.secret').forEach(el => el.classList.remove('secret'));
    showMsg('✅ Imported ' + count + ' value(s) from .env — review below, then click Save & Apply.', 'info');
    input.value = '';
  };
  reader.readAsText(file);
}

// ── Wire buttons ───────────────────────────────────────────────────────────
document.querySelectorAll('[data-test]').forEach(btn => {
  btn.addEventListener('click', () => testApi(btn.getAttribute('data-test')));
});
document.getElementById('btn-reset').addEventListener('click', resetToDefaults);
document.getElementById('btn-validate').addEventListener('click', validateOnly);
document.getElementById('btn-export').addEventListener('click', exportSettings);
document.getElementById('btn-import-env').addEventListener('click', () => document.getElementById('env-file-input').click());

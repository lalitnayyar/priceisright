services:

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rag-init:
    build: .
    command: ["python", "main.py", "--mode", "init-rag"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["python", "main.py", "--mode", "api"]
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    command: ["python", "main.py", "--mode", "dashboard"]
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

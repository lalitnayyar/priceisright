services:

  chromadb:
    # Pin to a known-stable version — avoids API path changes in :latest
    image: chromadb/chroma:0.4.24
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      # Use python (always present in the chroma image) to check the heartbeat
      test: [
        "CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"
      ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  rag-init:
    build: .
    command: ["python", "main.py", "--mode", "init-rag"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["python", "main.py", "--mode", "api"]
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Live code mount: git pull + restart is enough, no rebuild needed
      - .:/app
      # Re-mount data over the top so the host ./data bind still wins
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    command: ["python", "main.py", "--mode", "dashboard"]
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Live code mount: git pull + restart is enough, no rebuild needed
      - .:/app
      # Re-mount data over the top so the host ./data bind still wins
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
